name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    steps:
      - name: Verify deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] || [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "Missing deploy secrets. Add DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, and DEPLOY_PATH in GitHub repo settings."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "dist,package.json,package-lock.json,ecosystem.config.cjs,assets,migrations"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Install prod deps & restart PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY_ENV="${{ github.event.inputs.environment || 'production' }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p config logs uploads debug raw
            export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
            npm ci --omit=dev
            if command -v psql >/dev/null 2>&1 && [ -f "config/.env.$DEPLOY_ENV" ]; then
              set -a
              # shellcheck disable=SC1090
              . "config/.env.$DEPLOY_ENV"
              set +a
              PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USERNAME" -d "$DB_NAME" -p "${DB_PORT:-5432}" -f migrations/017_email_verification.sql || true
              PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USERNAME" -d "$DB_NAME" -p "${DB_PORT:-5432}" -f migrations/018_agent_agreement_email_sent.sql || true
              PGPASSWORD="$DB_PASSWORD" psql -h "$DB_HOST" -U "$DB_USERNAME" -d "$DB_NAME" -p "${DB_PORT:-5432}" -f migrations/019_agent_agreement_reminders.sql || true
            fi
            if pm2 describe enroll-api >/dev/null 2>&1; then
              pm2 reload ecosystem.config.cjs --env "$DEPLOY_ENV" --update-env
            else
              pm2 start ecosystem.config.cjs --env "$DEPLOY_ENV"
            fi
            pm2 save
