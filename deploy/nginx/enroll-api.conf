# Nginx site config for the Uniwizer API (Hostinger VPS / Ubuntu).
# Copy to /etc/nginx/sites-available/enroll-api and symlink into sites-enabled.
#
#   sudo cp deploy/nginx/enroll-api.conf /etc/nginx/sites-available/enroll-api
#   sudo ln -sf /etc/nginx/sites-available/enroll-api /etc/nginx/sites-enabled/enroll-api
#   sudo nginx -t && sudo systemctl reload nginx
#
# client_max_body_size must be >= the largest multer upload limit (catalog import: 25 MB).

upstream enroll_api {
    server 127.0.0.1:4001;
    keepalive 32;
}

server {
    listen 80;
    server_name api.example.com;

    # Allow catalog imports and other admin uploads (default nginx limit is 1 MB).
    client_max_body_size 50M;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_pass http://enroll_api;
    }
}
